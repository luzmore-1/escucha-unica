<!DOCTYPE html>

<html>
<head>
  <title>Escucha única</title>
</head>
<body>

  <h2 id="mensaje">Cargando...</h2>

  <audio id="audio" controls controlsList="nodownload" style="display:none;">
    <source src="./audio.mp3" type="audio/mpeg">
    Tu navegador no soporta audio.
  </audio>

  <script>
    const mensaje = document.getElementById("mensaje");
    const audio = document.getElementById("audio");

    const usada = localStorage.getItem("escucha_unica");

    if (usada) {
      mensaje.innerText = "Esta obra ya fue escuchada.";
    } else {
      mensaje.innerText = "Haz clic en reproducir para escuchar";
      audio.style.display = "block";

      let marcada = false;

      audio.addEventListener("play", () => {
        if (!marcada) {
          localStorage.setItem("escucha_unica", "true");
          mensaje.innerText = "Reproduciendo...";
          marcada = true;
        }
      });
    }
  </script>

</body>
</html>
